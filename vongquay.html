<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Vòng Quay – EduTeacher Hub</title>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --blue:#3b7de9;--green:#10b981;--orange:#f59e0b;--purple:#8b5cf6;
  --red:#ef4444;--pink:#ec4899;--teal:#06b6d4;--indigo:#6366f1;
  --text:#1e293b;--text2:#334155;--muted:#64748b;
  --border:#e2e8f0;--bg:#f8fafc;--white:#fff;
}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);min-height:100vh;overflow-x:hidden;}

.app-header{background:linear-gradient(135deg,#f59e0b,#ef4444);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 4px 20px rgba(245,158,11,.3);}
.app-logo{color:#fff;font-size:1.1rem;font-weight:900;}
.app-logo span{opacity:.7;font-weight:400;font-size:.85rem;margin-left:8px;}
.hbtn{padding:7px 14px;border-radius:8px;border:none;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .15s;}
.hbtn-white{background:#fff;color:#b45309;}
.hbtn-white:hover{background:#fffbeb;}
.hbtn-outline{background:rgba(255,255,255,.2);color:#fff;border:1.5px solid rgba(255,255,255,.4);}
.hbtn-outline:hover{background:rgba(255,255,255,.3);}

.main{display:grid;grid-template-columns:1fr 340px;gap:24px;max-width:1100px;margin:0 auto;padding:28px 20px;}
@media(max-width:800px){.main{grid-template-columns:1fr;}}

.wheel-area{display:flex;flex-direction:column;align-items:center;gap:20px;}
.wheel-container{position:relative;display:flex;align-items:center;justify-content:center;}
#wheel-canvas{border-radius:50%;box-shadow:0 8px 40px rgba(0,0,0,.18);display:block;}
.wheel-ptr{position:absolute;top:50%;right:-18px;transform:translateY(-50%);width:0;height:0;
  border-top:18px solid transparent;border-bottom:18px solid transparent;
  border-right:36px solid #1e293b;filter:drop-shadow(-2px 0 4px rgba(0,0,0,.3));z-index:5;}
.wheel-center{position:absolute;width:52px;height:52px;background:#fff;border-radius:50%;
  border:4px solid #e2e8f0;box-shadow:0 2px 10px rgba(0,0,0,.15);
  display:flex;align-items:center;justify-content:center;font-size:1.3rem;cursor:pointer;z-index:6;}
.wheel-center:hover{transform:scale(1.08);}

.spin-btn{padding:14px 48px;border-radius:14px;border:none;font-size:1rem;font-weight:900;cursor:pointer;
  background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;
  box-shadow:0 6px 20px rgba(245,158,11,.4);transition:all .18s;letter-spacing:.3px;}
.spin-btn:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 10px 28px rgba(245,158,11,.5);}
.spin-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}

.spin-result{text-align:center;min-height:52px;}
.result-label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.result-val{font-size:1.5rem;font-weight:900;color:var(--text);animation:popIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes popIn{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}

.wheel-options{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;}
.opt-check{display:flex;align-items:center;gap:5px;font-size:.78rem;color:var(--text2);font-weight:600;cursor:pointer;}
.opt-check input{width:15px;height:15px;accent-color:var(--orange);}

.panel{background:var(--white);border-radius:16px;padding:20px;box-shadow:0 4px 20px rgba(0,0,0,.06);border:1.5px solid var(--border);}
.panel-title{font-size:.8rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:14px;}

/* Import tabs */
.import-tabs{display:flex;gap:0;border-bottom:1.5px solid var(--border);margin-bottom:12px;}
.itab{padding:7px 12px;font-size:.75rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2.5px solid transparent;margin-bottom:-1.5px;transition:all .12s;white-space:nowrap;}
.itab.active{color:var(--orange);border-bottom-color:var(--orange);}
.itab-panel{display:none;}
.itab-panel.active{display:block;}

.add-row{display:flex;gap:8px;margin-bottom:12px;}
.add-row input{flex:1;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:.85rem;color:var(--text);outline:none;font-family:inherit;}
.add-row input:focus{border-color:var(--orange);}
.add-row button{padding:9px 14px;border-radius:9px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-weight:800;font-size:.85rem;cursor:pointer;white-space:nowrap;}
.add-row button:hover{opacity:.9;}

.bulk-hint{font-size:.7rem;color:var(--muted);margin-bottom:6px;}
.bulk-textarea{width:100%;height:100px;padding:9px 12px;border-radius:9px;border:1.5px solid var(--border);font-size:.82rem;color:var(--text);resize:vertical;font-family:inherit;outline:none;margin-bottom:8px;}
.bulk-textarea:focus{border-color:var(--orange);}
.bulk-btn{width:100%;padding:9px;border-radius:9px;border:none;background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;font-weight:800;font-size:.82rem;cursor:pointer;}

.import-file-label{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:10px;border-radius:9px;border:1.5px dashed var(--border);font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;transition:all .15s;margin-bottom:8px;}
.import-file-label:hover{border-color:var(--orange);color:var(--orange);background:#fffbeb;}
.import-hint{font-size:.7rem;color:var(--muted);line-height:1.6;}

.items-list{display:flex;flex-direction:column;gap:6px;max-height:260px;overflow-y:auto;margin-bottom:14px;padding-right:2px;}
.items-list::-webkit-scrollbar{width:4px;}
.items-list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

.item-row{display:flex;align-items:center;gap:8px;padding:8px 10px;border-radius:9px;background:var(--bg);border:1.5px solid var(--border);transition:border-color .12s;}
.item-row:hover{border-color:var(--orange);}
.item-color{width:14px;height:14px;border-radius:50%;flex-shrink:0;}
.item-text{flex:1;font-size:.83rem;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.item-del{background:none;border:none;color:var(--muted);font-size:.95rem;cursor:pointer;padding:0 4px;border-radius:4px;line-height:1;}
.item-del:hover{color:var(--red);background:#fef2f2;}

.panel-actions{display:flex;gap:8px;flex-wrap:wrap;}
.act-btn{flex:1;padding:9px 10px;border-radius:9px;border:1.5px solid var(--border);background:#fff;font-size:.78rem;font-weight:700;color:var(--text2);cursor:pointer;transition:all .14s;text-align:center;}
.act-btn:hover{border-color:var(--orange);color:var(--orange);}
.act-btn.danger:hover{border-color:var(--red);color:var(--red);}

.divider{height:1px;background:var(--border);margin:14px 0;}

.history-list{display:flex;flex-direction:column;gap:5px;max-height:140px;overflow-y:auto;}
.history-item{display:flex;align-items:center;gap:8px;font-size:.78rem;color:var(--text2);}
.history-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.history-name{flex:1;font-weight:600;}
.history-time{color:var(--muted);font-size:.68rem;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:1000;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.modal-overlay.show{display:flex;}
.modal-card{background:#fff;border-radius:24px;padding:40px 36px;max-width:420px;width:90%;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:modalIn .4s cubic-bezier(.34,1.56,.64,1);}
@keyframes modalIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.modal-emoji{font-size:3.5rem;margin-bottom:12px;animation:bounce 1s ease infinite alternate;}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-8px)}}
.modal-label{font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px;}
.modal-winner{font-size:2rem;font-weight:900;color:var(--text);margin-bottom:24px;line-height:1.3;}
.modal-btns{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.mbtn{padding:11px 24px;border-radius:11px;border:none;font-size:.85rem;font-weight:800;cursor:pointer;transition:all .15s;}
.mbtn-orange{background:linear-gradient(135deg,#f59e0b,#ef4444);color:#fff;box-shadow:0 4px 14px rgba(245,158,11,.3);}
.mbtn-orange:hover{transform:translateY(-1px);}
.mbtn-ghost{background:var(--bg);border:1.5px solid var(--border);color:var(--text2);}
.mbtn-ghost:hover{background:var(--border);}
.mbtn-red{background:#fef2f2;border:1.5px solid #fecaca;color:var(--red);}
.mbtn-red:hover{background:#fee2e2;}

.confetti-piece{position:fixed;pointer-events:none;z-index:9999;border-radius:2px;animation:confettiFall 2.5s ease-in forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(110vh) rotate(720deg);opacity:0;}}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#1e293b;color:#fff;padding:10px 20px;border-radius:10px;font-size:.82rem;font-weight:600;opacity:0;transition:all .3s;pointer-events:none;z-index:9998;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

.empty-items{text-align:center;padding:24px 10px;color:var(--muted);font-size:.82rem;}
</style>
</head>
<body>

<div class="app-header">
  <div class="app-logo">🎡 Vòng Quay May Mắn <span>EduTeacher Hub</span></div>
  <div style="display:flex;gap:8px;">
    <button class="hbtn hbtn-outline" onclick="loadSample()">📋 Mẫu</button>
    <button class="hbtn hbtn-white" onclick="saveList()">💾 Lưu</button>
  </div>
</div>

<div class="main">
  <div class="wheel-area">
    <div class="wheel-container">
      <canvas id="wheel-canvas" width="420" height="420"></canvas>
      <div class="wheel-ptr"></div>
      <div class="wheel-center" onclick="spin()" title="Quay!">🎡</div>
    </div>
    <div class="spin-result" id="spin-result">
      <div class="result-label" style="visibility:hidden">Kết quả</div>
    </div>
    <button class="spin-btn" id="spin-btn" onclick="spin()">🎡 QUAY!</button>
    <div class="wheel-options">
      <label class="opt-check">
        <input type="checkbox" id="opt-remove"/> Xóa người chiến thắng
      </label>
      <label class="opt-check">
        <input type="checkbox" id="opt-modal" checked/> Hiện popup kết quả
      </label>
    </div>
  </div>

  <div>
    <div class="panel">
      <div class="panel-title">📋 Danh Sách (Tối đa 30)</div>

      <div class="import-tabs">
        <div class="itab active" id="itab-btn-single" onclick="switchItab('single')">✏️ Từng tên</div>
        <div class="itab" id="itab-btn-bulk" onclick="switchItab('bulk')">📝 Nhiều tên</div>
        <div class="itab" id="itab-btn-excel" onclick="switchItab('excel')">📊 Excel</div>
      </div>

      <div class="itab-panel active" id="itab-single">
        <div class="add-row">
          <input type="text" id="new-item" placeholder="Nhập tên hoặc nội dung..." maxlength="40"
            onkeydown="if(event.key==='Enter')addItem()"/>
          <button onclick="addItem()">➕ Thêm</button>
        </div>
      </div>

      <div class="itab-panel" id="itab-bulk">
        <div class="bulk-hint">Mỗi dòng một tên – tối đa 30 mục</div>
        <textarea class="bulk-textarea" id="bulk-input" placeholder="Nguyễn Văn A&#10;Trần Thị B&#10;Lê Văn C&#10;..."></textarea>
        <button class="bulk-btn" onclick="addBulk()">➕ Thêm tất cả</button>
      </div>

      <div class="itab-panel" id="itab-excel">
        <label class="import-file-label">
          📂 Chọn file Excel (.xlsx / .xls)
          <input type="file" accept=".xlsx,.xls" style="display:none" onchange="importExcel(this)"/>
        </label>
        <div class="import-hint">
          File cần có 2 cột: <b>STT</b> và <b>Họ tên</b><br/>
          Dòng đầu là tiêu đề, dữ liệu từ dòng 2 trở đi.
        </div>
      </div>

      <div class="items-list" id="items-list">
        <div class="empty-items">Chưa có mục nào. Thêm hoặc dùng mẫu!</div>
      </div>

      <div class="panel-actions">
        <button class="act-btn" onclick="shuffleItems()">🔀 Xáo trộn</button>
        <button class="act-btn danger" onclick="clearAll()">🗑 Xóa hết</button>
      </div>

      <div class="divider"></div>
      <div class="panel-title">📜 Lịch Sử Quay</div>
      <div class="history-list" id="history-list">
        <div style="font-size:.78rem;color:var(--muted);">Chưa có lịch sử.</div>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal-card">
    <div class="modal-emoji">🎉</div>
    <div class="modal-label">Kết Quả</div>
    <div class="modal-winner" id="modal-winner"></div>
    <div class="modal-btns">
      <button class="mbtn mbtn-orange" onclick="closeModal();spin()">🔄 Quay tiếp</button>
      <button class="mbtn mbtn-ghost" onclick="closeModal()">✅ Xong</button>
      <button class="mbtn mbtn-red" id="modal-remove-btn" onclick="removeWinner()">🗑 Xóa</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const COLORS = [
  '#f59e0b','#ef4444','#3b7de9','#10b981','#8b5cf6',
  '#ec4899','#06b6d4','#f97316','#84cc16','#6366f1',
  '#14b8a6','#f43f5e','#a855f7','#0ea5e9','#22c55e',
];

let items = [];
let spinning = false;
let currentAngle = 0;
let lastWinner = null;
let history = [];

const canvas = document.getElementById('wheel-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height, CX = W/2, CY = H/2, R = W/2 - 10;

function drawWheel(){
  ctx.clearRect(0,0,W,H);
  if(!items.length){
    ctx.fillStyle='#f1f5f9';
    ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#94a3b8';ctx.font='bold 16px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('Thêm mục để bắt đầu',CX,CY);
    return;
  }
  const n = items.length;
  const arc = (Math.PI*2)/n;
  items.forEach((item,i)=>{
    const start = currentAngle + arc*i;
    const end = start + arc;
    ctx.beginPath();ctx.moveTo(CX,CY);ctx.arc(CX,CY,R,start,end);ctx.closePath();
    ctx.fillStyle = COLORS[i%COLORS.length];ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    ctx.save();
    ctx.translate(CX,CY);ctx.rotate(start + arc/2);
    ctx.textAlign='right';ctx.textBaseline='middle';
    const maxLen = Math.floor(R*0.55);
    const fontSize = n>16?10:n>10?12:n>6?13:15;
    ctx.font=`bold ${fontSize}px Segoe UI`;
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(0,0,0,.4)';ctx.shadowBlur=3;
    let txt=item.text;
    while(ctx.measureText(txt).width>maxLen&&txt.length>3) txt=txt.slice(0,-1);
    if(txt!==item.text) txt=txt.slice(0,-1)+'…';
    ctx.fillText(txt, R-12, 0);
    ctx.restore();
  });
  ctx.beginPath();ctx.arc(CX,CY,R,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=5;ctx.stroke();
  ctx.beginPath();ctx.arc(CX,CY,28,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();
  ctx.strokeStyle='#e2e8f0';ctx.lineWidth=3;ctx.stroke();
  ctx.fillStyle='#334155';ctx.font='bold 18px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('🎡',CX,CY+1);
}

function spin(){
  if(spinning||!items.length) return;
  if(items.length<2){ showToast('Cần ít nhất 2 mục để quay!'); return; }
  spinning=true;
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('spin-result').innerHTML='';
  const winIdx = Math.floor(Math.random()*items.length);
  const arc = (Math.PI*2)/items.length;
  const targetCenter = -(currentAngle + arc*winIdx + arc/2);
  const spins = 6 + Math.random()*4;
  const totalRotation = spins*Math.PI*2 + ((targetCenter%(Math.PI*2))+(Math.PI*2))%(Math.PI*2);
  const duration = 4000 + Math.random()*1500;
  const startAngle = currentAngle;
  const startTime = performance.now();
  function easeOut(t){ return 1-Math.pow(1-t,4); }
  function frame(now){
    const t = Math.min((now-startTime)/duration,1);
    currentAngle = startAngle + totalRotation*easeOut(t);
    drawWheel();
    if(t<1){ requestAnimationFrame(frame); return; }
    currentAngle = currentAngle%(Math.PI*2);
    spinning=false;
    document.getElementById('spin-btn').disabled=false;
    showWinner(items[winIdx],winIdx);
  }
  requestAnimationFrame(frame);
}

function showWinner(item,idx){
  lastWinner={item,idx};
  history.unshift({text:item.text,color:COLORS[idx%COLORS.length],time:new Date()});
  if(history.length>20) history.pop();
  renderHistory();
  spawnConfetti();
  document.getElementById('spin-result').innerHTML=`
    <div class="result-label">🎯 Kết Quả</div>
    <div class="result-val">${escHtml(item.text)}</div>`;
  if(document.getElementById('opt-remove').checked){
    items.splice(idx,1); renderItems(); drawWheel();
  }
  if(document.getElementById('opt-modal').checked){
    document.getElementById('modal-winner').textContent=item.text;
    document.getElementById('modal-remove-btn').style.display=
      document.getElementById('opt-remove').checked?'none':'';
    document.getElementById('modal').classList.add('show');
  }
}

function removeWinner(){
  if(!lastWinner) return;
  const i=items.indexOf(lastWinner.item);
  if(i>=0){items.splice(i,1);renderItems();drawWheel();}
  closeModal(); showToast('Đã xóa khỏi vòng quay!');
}

function closeModal(){ document.getElementById('modal').classList.remove('show'); }
document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal')) closeModal();
});

/* ITEMS */
function addItem(){
  const inp=document.getElementById('new-item');
  const txt=inp.value.trim();
  if(!txt){showToast('Hãy nhập nội dung!');return;}
  if(items.length>=30){showToast('Tối đa 30 mục!');return;}
  if(items.find(x=>x.text===txt)){showToast('Mục này đã có rồi!');return;}
  items.push({text:txt}); inp.value=''; inp.focus();
  renderItems(); drawWheel();
}

function removeItem(i){ items.splice(i,1); renderItems(); drawWheel(); }

function renderItems(){
  const list=document.getElementById('items-list');
  if(!items.length){
    list.innerHTML='<div class="empty-items">Chưa có mục nào. Thêm hoặc dùng mẫu!</div>';
    return;
  }
  list.innerHTML=items.map((item,i)=>`
    <div class="item-row">
      <div class="item-color" style="background:${COLORS[i%COLORS.length]}"></div>
      <div class="item-text">${escHtml(item.text)}</div>
      <button class="item-del" onclick="removeItem(${i})" title="Xóa">✕</button>
    </div>`).join('');
}

function shuffleItems(){
  if(!items.length) return;
  for(let i=items.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[items[i],items[j]]=[items[j],items[i]];}
  renderItems(); drawWheel(); showToast('Đã xáo trộn thứ tự!');
}

function clearAll(){
  if(!items.length) return;
  if(!confirm('Xóa hết tất cả mục?')) return;
  items=[]; renderItems(); drawWheel(); showToast('Đã xóa hết!');
}

/* IMPORT TABS */
function switchItab(tab){
  ['single','bulk','excel'].forEach(t=>{
    document.getElementById('itab-btn-'+t).classList.toggle('active',t===tab);
    document.getElementById('itab-'+t).classList.toggle('active',t===tab);
  });
}

/* BULK ADD */
function addBulk(){
  const raw=document.getElementById('bulk-input').value;
  const lines=raw.split('\n').map(s=>s.trim()).filter(s=>s.length>0);
  if(!lines.length){showToast('Hãy nhập ít nhất 1 tên!');return;}
  let added=0,skipped=0;
  lines.forEach(txt=>{
    if(items.length>=30){skipped++;return;}
    if(items.find(x=>x.text===txt)){skipped++;return;}
    items.push({text:txt}); added++;
  });
  document.getElementById('bulk-input').value='';
  renderItems(); drawWheel();
  showToast(`Đã thêm ${added} tên${skipped?`, bỏ qua ${skipped} trùng/quá giới hạn`:''}`);
}

/* EXCEL IMPORT */
function importExcel(input){
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      let added=0,skipped=0;
      for(let i=1;i<rows.length;i++){
        const name=(rows[i][1]||'').toString().trim();
        if(!name) continue;
        if(items.length>=30){skipped++;continue;}
        if(items.find(x=>x.text===name)){skipped++;continue;}
        items.push({text:name}); added++;
      }
      renderItems(); drawWheel();
      showToast(`Nhập Excel: ${added} học sinh${skipped?`, bỏ qua ${skipped}`:''}`);
    }catch(err){ showToast('Lỗi đọc file Excel! Kiểm tra định dạng.'); }
  };
  reader.readAsArrayBuffer(file);
  input.value='';
}

/* HISTORY */
function renderHistory(){
  const list=document.getElementById('history-list');
  if(!history.length){list.innerHTML='<div style="font-size:.78rem;color:var(--muted);">Chưa có lịch sử.</div>';return;}
  list.innerHTML=history.map(h=>`
    <div class="history-item">
      <div class="history-dot" style="background:${h.color}"></div>
      <div class="history-name">${escHtml(h.text)}</div>
      <div class="history-time">${fmtTime(h.time)}</div>
    </div>`).join('');
}
function fmtTime(d){ return d.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}); }

/* SAVE / LOAD */
function saveList(){
  if(!items.length){showToast('Chưa có mục để lưu!');return;}
  try{localStorage.setItem('vq_items',JSON.stringify(items));showToast('Đã lưu danh sách!');}
  catch(e){showToast('Không lưu được!');}
}

function loadSaved(){
  try{
    const saved=localStorage.getItem('vq_items');
    if(saved){items=JSON.parse(saved);renderItems();drawWheel();}
  }catch(e){}
}

function loadSample(){
  items=[
    {text:'Nguyễn Văn A'},{text:'Trần Thị B'},{text:'Lê Văn C'},
    {text:'Phạm Thị D'},{text:'Hoàng Văn E'},{text:'Đặng Thị F'},
    {text:'Bùi Văn G'},{text:'Vũ Thị H'},
  ];
  renderItems(); drawWheel(); showToast('Đã tải danh sách mẫu!');
}

/* UTILS */
function escHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function spawnConfetti(){
  const colors=['#f59e0b','#ef4444','#3b7de9','#10b981','#8b5cf6','#ec4899'];
  for(let i=0;i<40;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-20px;width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;background:${colors[Math.floor(Math.random()*colors.length)]};animation-delay:${Math.random()*.8}s;animation-duration:${2+Math.random()}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),3500);
  }
}

function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2200);
}

loadSaved();
if(!items.length) loadSample();
drawWheel();
</script>
</body>
</html>
