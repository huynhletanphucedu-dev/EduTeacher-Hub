<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hangman – English Vocabulary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;background:#1e293b;padding:.75rem 1rem;text-align:center;border-bottom:1px solid #334155}
header h1{font-size:1.1rem;font-weight:700;color:#38bdf8;letter-spacing:.05em}
header h2{font-size:.75rem;color:#94a3b8;margin-top:2px}
.top-bar{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:440px;padding:.6rem 1rem}
.score-box{background:#1e293b;border-radius:10px;padding:.35rem .8rem;font-size:.8rem;color:#94a3b8}
.score-box span{color:#f8fafc;font-weight:700;font-size:1rem}
.btn-cat{background:#1e293b;border:1px solid #334155;border-radius:8px;padding:.35rem .8rem;font-size:.75rem;color:#94a3b8;cursor:pointer}
/* Canvas */
canvas{display:block;margin:0 auto}
/* Word display */
.word-area{width:100%;max-width:440px;padding:.5rem 1rem}
.hint{text-align:center;font-size:.8rem;color:#94a3b8;margin-bottom:.4rem;min-height:1.2em}
.letters-row{display:flex;flex-wrap:wrap;justify-content:center;gap:6px}
.letter-blank{width:30px;height:36px;border-bottom:2.5px solid #38bdf8;display:flex;align-items:flex-end;justify-content:center;font-size:1.25rem;font-weight:700;color:#f8fafc;padding-bottom:2px}
/* Keyboard */
.keyboard{width:100%;max-width:440px;padding:.5rem .6rem 1rem}
.kb-row{display:flex;justify-content:center;gap:5px;margin-bottom:5px}
.kb-btn{width:30px;height:38px;border-radius:7px;border:none;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .15s;background:#1e293b;color:#e2e8f0;border:1px solid #334155}
.kb-btn:active{transform:scale(.92)}
.kb-btn.used-wrong{background:#450a0a;color:#dc2626;border-color:#dc2626}
.kb-btn.used-right{background:#052e16;color:#16a34a;border-color:#16a34a}
.kb-btn:disabled{cursor:default}
/* Result overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:50;display:none}
.result-card{background:#1e293b;border-radius:18px;padding:2rem;text-align:center;max-width:320px;width:90%}
.result-emoji{font-size:3rem;margin-bottom:.5rem}
.result-title{font-size:1.4rem;font-weight:700;margin-bottom:.3rem}
.result-word{font-size:1.1rem;color:#38bdf8;margin:.3rem 0 .7rem}
.btn-next{background:#0ea5e9;color:#fff;border:none;border-radius:10px;padding:.75rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
/* Cat picker */
.cat-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:60}
.cat-card{background:#1e293b;border-radius:18px;padding:1.5rem;max-width:320px;width:90%}
.cat-card h3{margin-bottom:1rem;color:#38bdf8;font-size:1rem}
.cat-btn{display:block;width:100%;background:#0f172a;border:1px solid #334155;color:#e2e8f0;padding:.7rem 1rem;border-radius:10px;margin-bottom:.5rem;cursor:pointer;text-align:left;font-size:.9rem}
.cat-btn:hover{border-color:#38bdf8;color:#38bdf8}
.cat-close{margin-top:.5rem;width:100%;background:transparent;border:1px solid #334155;color:#94a3b8;padding:.5rem;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<header>
  <h1>🍦 ĐỐ TỪ TIẾNG ANH</h1>
  <h2>ĐOÁN SAI LÀ KEM TAN MẤT THÔI!</h2>
</header>
<div class="top-bar">
  <div class="score-box">Đúng: <span id="scoreW">0</span> &nbsp;Sai: <span id="scoreL">0</span></div>
  <button class="btn-cat" onclick="showCatPicker()">📚 Chủ đề</button>
</div>

<canvas id="cvs" width="220" height="170"></canvas>

<div class="word-area">
  <div class="hint" id="hint"></div>
  <div class="letters-row" id="lettersRow"></div>
</div>

<div class="keyboard" id="keyboard"></div>

<!-- Result overlay -->
<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="result-emoji" id="resEmoji"></div>
    <div class="result-title" id="resTitle"></div>
    <div style="font-size:.85rem;color:#94a3b8;margin-bottom:.3rem" id="resLabel"></div>
    <div class="result-word" id="resWord"></div>
    <button class="btn-next" onclick="nextRound()">Từ tiếp theo →</button>
  </div>
</div>

<!-- Category picker -->
<div class="cat-overlay" id="catOverlay">
  <div class="cat-card">
    <h3>Chọn chủ đề</h3>
    <button class="cat-btn" onclick="selectCat(0)">📖 Từ vựng cơ bản (lớp 6-7)</button>
    <button class="cat-btn" onclick="selectCat(1)">🔤 Động từ bất quy tắc</button>
    <button class="cat-btn" onclick="selectCat(2)">🏫 Chủ đề trường học</button>
    <button class="cat-btn" onclick="selectCat(3)">👨‍👩‍👧 Chủ đề gia đình</button>
    <button class="cat-btn" onclick="selectCat(4)">🍎 Chủ đề thực phẩm</button>
    <button class="cat-close" onclick="closeCatPicker()">Đóng</button>
  </div>
</div>

<script>
const CATS = [
  { name:'Từ vựng cơ bản', words:[
    {w:'HAPPY',h:'Vui vẻ, hạnh phúc'},{w:'BEAUTIFUL',h:'Đẹp'},{w:'STUDENT',h:'Học sinh'},{w:'TEACHER',h:'Giáo viên'},
    {w:'SCHOOL',h:'Trường học'},{w:'LIBRARY',h:'Thư viện'},{w:'COMPUTER',h:'Máy tính'},{w:'WINDOW',h:'Cửa sổ'},
    {w:'GARDEN',h:'Vườn'},{w:'MOUNTAIN',h:'Núi'},{w:'RIVER',h:'Sông'},{w:'WEATHER',h:'Thời tiết'},
    {w:'BREAKFAST',h:'Bữa sáng'},{w:'KITCHEN',h:'Nhà bếp'},{w:'EXERCISE',h:'Bài tập / Tập thể dục'},
    {w:'HOSPITAL',h:'Bệnh viện'},{w:'MARKET',h:'Chợ'},{w:'JOURNEY',h:'Hành trình'},
  ]},
  { name:'Động từ bất quy tắc', words:[
    {w:'BEGAN',h:'V2 của "begin" (bắt đầu)'},{w:'BROKE',h:'V2 của "break" (vỡ)'},{w:'BROUGHT',h:'V2 của "bring" (mang)'},
    {w:'BOUGHT',h:'V2 của "buy" (mua)'},{w:'CAUGHT',h:'V2 của "catch" (bắt)'},{w:'CHOSE',h:'V2 của "choose" (chọn)'},
    {w:'CAME',h:'V2 của "come" (đến)'},{w:'DREW',h:'V2 của "draw" (vẽ)'},{w:'DROVE',h:'V2 của "drive" (lái)'},
    {w:'FELL',h:'V2 của "fall" (ngã)'},{w:'FELT',h:'V2 của "feel" (cảm thấy)'},{w:'FOUND',h:'V2 của "find" (tìm thấy)'},
    {w:'FLEW',h:'V2 của "fly" (bay)'},{w:'FORGOT',h:'V2 của "forget" (quên)'},{w:'GAVE',h:'V2 của "give" (cho)'},
    {w:'WENT',h:'V2 của "go" (đi)'},{w:'GREW',h:'V2 của "grow" (lớn lên)'},{w:'HEARD',h:'V2 của "hear" (nghe)'},
    {w:'KEPT',h:'V2 của "keep" (giữ)'},{w:'KNEW',h:'V2 của "know" (biết)'},{w:'LEFT',h:'V2 của "leave" (rời đi)'},
    {w:'LOST',h:'V2 của "lose" (mất)'},{w:'MADE',h:'V2 của "make" (làm)'},{w:'MET',h:'V2 của "meet" (gặp)'},
    {w:'PAID',h:'V2 của "pay" (trả)'},{w:'PUT',h:'V2/V3 của "put" (đặt)'},{w:'READ',h:'V2/V3 của "read" (đọc)'},
    {w:'RAN',h:'V2 của "run" (chạy)'},{w:'SAID',h:'V2 của "say" (nói)'},{w:'SAW',h:'V2 của "see" (nhìn thấy)'},
    {w:'SOLD',h:'V2 của "sell" (bán)'},{w:'SENT',h:'V2 của "send" (gửi)'},{w:'SANG',h:'V2 của "sing" (hát)'},
    {w:'SLEPT',h:'V2 của "sleep" (ngủ)'},{w:'SPOKE',h:'V2 của "speak" (nói)'},{w:'SPENT',h:'V2 của "spend" (tiêu)'},
    {w:'STOOD',h:'V2 của "stand" (đứng)'},{w:'SWAM',h:'V2 của "swim" (bơi)'},{w:'TOOK',h:'V2 của "take" (lấy)'},
    {w:'TAUGHT',h:'V2 của "teach" (dạy)'},{w:'TOLD',h:'V2 của "tell" (kể)'},{w:'THOUGHT',h:'V2 của "think" (nghĩ)'},
    {w:'THREW',h:'V2 của "throw" (ném)'},{w:'UNDERSTOOD',h:'V2 của "understand" (hiểu)'},{w:'WORE',h:'V2 của "wear" (mặc)'},
    {w:'WON',h:'V2 của "win" (thắng)'},{w:'WROTE',h:'V2 của "write" (viết)'},
  ]},
  { name:'Trường học', words:[
    {w:'CLASSROOM',h:'Phòng học'},{w:'BLACKBOARD',h:'Bảng đen'},{w:'NOTEBOOK',h:'Vở/Sổ tay'},
    {w:'PENCIL',h:'Bút chì'},{w:'ERASER',h:'Tẩy'},{w:'RULER',h:'Thước kẻ'},
    {w:'UNIFORM',h:'Đồng phục'},{w:'PRINCIPAL',h:'Hiệu trưởng'},{w:'HOMEWORK',h:'Bài tập về nhà'},
    {w:'SEMESTER',h:'Học kỳ'},{w:'EXAMINATION',h:'Kỳ thi'},{w:'SUBJECT',h:'Môn học'},
    {w:'MATHEMATICS',h:'Môn Toán'},{w:'ENGLISH',h:'Môn Tiếng Anh'},
  ]},
  { name:'Gia đình', words:[
    {w:'FATHER',h:'Cha/Bố'},{w:'MOTHER',h:'Mẹ'},{w:'BROTHER',h:'Anh/Em trai'},
    {w:'SISTER',h:'Chị/Em gái'},{w:'GRANDFATHER',h:'Ông ngoại/nội'},{w:'GRANDMOTHER',h:'Bà ngoại/nội'},
    {w:'UNCLE',h:'Chú/Bác'},{w:'AUNT',h:'Cô/Dì'},{w:'COUSIN',h:'Anh chị em họ'},
    {w:'HUSBAND',h:'Chồng'},{w:'WIFE',h:'Vợ'},{w:'PARENTS',h:'Cha mẹ'},
    {w:'CHILDREN',h:'Các con'},{w:'FAMILY',h:'Gia đình'},
  ]},
  { name:'Thực phẩm', words:[
    {w:'NOODLES',h:'Mì/Bún'},{w:'VEGETABLES',h:'Rau củ'},{w:'CHICKEN',h:'Thịt gà'},
    {w:'PINEAPPLE',h:'Dứa/Thơm'},{w:'BANANA',h:'Chuối'},{w:'STRAWBERRY',h:'Dâu tây'},
    {w:'CHOCOLATE',h:'Sô-cô-la'},{w:'SANDWICH',h:'Bánh mì kẹp'},{w:'BREAKFAST',h:'Bữa sáng'},
    {w:'ORANGE',h:'Cam (quả)'},{w:'NOODLE',h:'Bún/Mì'},{w:'SUGAR',h:'Đường'},
    {w:'BUTTER',h:'Bơ'},{w:'PEPPER',h:'Hạt tiêu'},
  ]},
];

let catIdx=1, wordList=[], wordObj=null, guessed=[], wrong=0, scoreW=0, scoreL=0;
const MAX_WRONG=6;
const KB_ROWS=['QWERTYUIOP','ASDFGHJKL','ZXCVBNM'];
const cvs=document.getElementById('cvs');
const ctx=cvs.getContext('2d');

function selectCat(i){catIdx=i;wordList=[...CATS[i].words];shuffle(wordList);closeCatPicker();nextRound();}
function showCatPicker(){document.getElementById('catOverlay').style.display='flex';}
function closeCatPicker(){document.getElementById('catOverlay').style.display='none';}
function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function nextRound(){
  document.getElementById('overlay').style.display='none';
  if(!wordList.length){wordList=[...CATS[catIdx].words];shuffle(wordList);}
  wordObj=wordList.pop();
  guessed=[];wrong=0;
  renderWord();renderKeyboard();drawHangman(0);
}

function renderWord(){
  const row=document.getElementById('lettersRow');
  document.getElementById('hint').textContent='💡 '+wordObj.h;
  row.innerHTML='';
  for(const ch of wordObj.w){
    const d=document.createElement('div');
    d.className='letter-blank';
    d.id='lb_'+Math.random().toString(36).slice(2);
    if(ch===' ')d.style.width='18px';
    else if(guessed.includes(ch))d.textContent=ch;
    row.appendChild(d);
  }
  // re-render by index
  const blanks=[...row.children];
  let bi=0;
  for(const ch of wordObj.w){
    if(ch!==' '){blanks[bi].textContent=guessed.includes(ch)?ch:'';}
    bi++;
  }
}

function renderKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  KB_ROWS.forEach(row=>{
    const div=document.createElement('div');div.className='kb-row';
    [...row].forEach(ch=>{
      const btn=document.createElement('button');
      btn.className='kb-btn';btn.textContent=ch;btn.id='kb_'+ch;
      btn.onclick=()=>guess(ch);
      if(guessed.includes(ch)){
        btn.disabled=true;
        btn.classList.add(wordObj.w.includes(ch)?'used-right':'used-wrong');
      }
      div.appendChild(btn);
    });
    kb.appendChild(div);
  });
}

function guess(ch){
  if(guessed.includes(ch))return;
  guessed.push(ch);
  const btn=document.getElementById('kb_'+ch);
  btn.disabled=true;
  if(wordObj.w.includes(ch)){
    btn.classList.add('used-right');
    renderWord();
    if([...wordObj.w].filter(c=>c!==' ').every(c=>guessed.includes(c)))showResult(true);
  } else {
    btn.classList.add('used-wrong');
    wrong++;
    drawHangman(wrong);
    if(wrong>=MAX_WRONG)showResult(false);
  }
}

function showResult(win){
  if(win){scoreW++;document.getElementById('scoreW').textContent=scoreW;}
  else{scoreL++;document.getElementById('scoreL').textContent=scoreL;}
  document.getElementById('resEmoji').textContent=win?'🎉':'😢';
  document.getElementById('resTitle').textContent=win?'Chính xác!':'Hết lượt!';
  document.getElementById('resLabel').textContent=win?'Bạn đã đoán đúng từ:':'Từ đúng là:';
  document.getElementById('resWord').textContent=wordObj.w;
  document.getElementById('overlay').style.display='flex';
  playSound(win);
}

// Audio
const AC=new (window.AudioContext||window.webkitAudioContext)();
function playSound(win){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(win){o.frequency.setValueAtTime(523,AC.currentTime);o.frequency.setValueAtTime(659,AC.currentTime+.1);o.frequency.setValueAtTime(784,AC.currentTime+.2);}
  else{o.frequency.setValueAtTime(300,AC.currentTime);o.frequency.setValueAtTime(200,AC.currentTime+.15);}
  g.gain.setValueAtTime(.25,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.5);
  o.start();o.stop(AC.currentTime+.5);
}

// Draw ice cream melting (replaces hangman - friendly for students!)
function drawHangman(step){
  ctx.clearRect(0,0,220,170);
  const cx=110, lineW=3;
  ctx.lineCap='round'; ctx.lineJoin='round';

  // Helper: filled circle
  function circle(x,y,r,fill,stroke){
    ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lineW;ctx.stroke();}
  }
  // Helper: arc path
  function arc(x,y,r,a0,a1,fill,stroke){
    ctx.beginPath();ctx.arc(x,y,r,a0,a1);
    if(fill){ctx.fillStyle=fill;ctx.fill();}
    if(stroke){ctx.strokeStyle=stroke;ctx.lineWidth=lineW;ctx.stroke();}
  }

  // ── CONE (always visible, may crack at step 5) ──
  function drawCone(cracked){
    ctx.beginPath();
    ctx.moveTo(cx-28,130);ctx.lineTo(cx+28,130);ctx.lineTo(cx,168);ctx.closePath();
    ctx.fillStyle='#d97706';ctx.fill();
    ctx.strokeStyle='#92400e';ctx.lineWidth=lineW;ctx.stroke();
    // waffle lines
    ctx.strokeStyle='#92400e';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(cx-14,140);ctx.lineTo(cx+14,140);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-7,152);ctx.lineTo(cx+7,152);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-1,140);ctx.lineTo(cx+5,162);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx+10,140);ctx.lineTo(cx+3,162);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-10,140);ctx.lineTo(cx-4,162);ctx.stroke();
    if(cracked){
      ctx.strokeStyle='#fff';ctx.lineWidth=2;
      ctx.beginPath();ctx.moveTo(cx,130);ctx.lineTo(cx-6,148);ctx.lineTo(cx+2,160);ctx.stroke();
    }
  }

  // ── SCOOP 1 – bottom (pink strawberry) ──
  function scoop1(){ circle(cx,118,22,'#fca5a5','#f43f5e'); }
  // ── SCOOP 2 – middle (choco) ──
  function scoop2(){ circle(cx,80,20,'#92400e','#78350f'); }
  // ── SCOOP 3 – top (mint) ──
  function scoop3(){ circle(cx,46,18,'#6ee7b7','#059669'); }

  // ── CHERRY on top ──
  function cherry(){
    circle(cx,26,6,'#dc2626','#991b1b');
    ctx.strokeStyle='#16a34a';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(cx,20);ctx.bezierCurveTo(cx+10,10,cx+16,16,cx+10,22);ctx.stroke();
  }

  // ── FACE on top scoop ──
  function face(happy){
    // eyes
    circle(cx-7,42,2.5,'#1e293b',null);
    circle(cx+7,42,2.5,'#1e293b',null);
    if(happy){
      ctx.beginPath();ctx.arc(cx,50,6,0,Math.PI);ctx.strokeStyle='#1e293b';ctx.lineWidth=2;ctx.stroke();
    } else {
      // sad mouth
      ctx.beginPath();ctx.arc(cx,54,6,Math.PI,0);ctx.strokeStyle='#1e293b';ctx.lineWidth=2;ctx.stroke();
      // tear
      ctx.fillStyle='#38bdf8';
      ctx.beginPath();ctx.ellipse(cx+10,50,3,5,0,0,Math.PI*2);ctx.fill();
    }
  }

  // ── DRIP drops ──
  function drip(x,y){
    ctx.fillStyle='#fca5a5';
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(x+8,y+10,3,0,Math.PI*2);ctx.fill();
  }

  // ── MELTED PUDDLE ──
  function puddle(){
    ctx.fillStyle='rgba(252,165,165,0.5)';
    ctx.beginPath();ctx.ellipse(cx,162,44,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(146,64,14,0.4)';
    ctx.beginPath();ctx.ellipse(cx+8,164,30,7,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1e293b';ctx.font='22px serif';
    ctx.fillText('😢',cx-12,158);
  }

  // Render based on step (0=full, 6=all melted)
  if(step===6){
    puddle();
    return;
  }

  drawCone(step>=5);

  if(step<4) scoop1();
  else if(step===4){ drip(cx-20,130);drip(cx+15,132); }

  if(step<3) scoop2();
  else if(step===3){ drip(cx-12,105); }

  if(step<2) scoop3();

  if(step<1){ cherry(); face(true); }
  else if(step===1){ face(false); }  // cherry gone, sad face
  else if(step===2){ /* scoop3 gone, show drip */ drip(cx-8,62); }
}

// Init
selectCat(1);
</script>
