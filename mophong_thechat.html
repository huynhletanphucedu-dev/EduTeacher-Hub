<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Các Thể Của Chất - KHTN Lớp 6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f172a;
    color: #f1f5f9;
    font-family: 'Segoe UI', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px 40px;
  }
  .container { width: 100%; max-width: 680px; }

  .header { text-align: center; margin-bottom: 24px; }
  .header h1 { font-size: 2rem; font-weight: 700; letter-spacing: -0.5px; }
  .header p { color: #94a3b8; margin-top: 6px; font-size: 0.95rem; }

  .canvas-panel {
    background: #1e293b;
    border-radius: 16px;
    padding: 16px;
    border: 1px solid #334155;
    margin-bottom: 20px;
  }
  canvas {
    display: block;
    margin: 0 auto;
    border-radius: 10px;
    background: #0f172a;
    border: 1px solid #334155;
  }

  .slider-section { margin-bottom: 20px; }
  .slider-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .slider-label { font-size: 0.9rem; color: #94a3b8; }
  .temp-display {
    font-size: 1.4rem;
    font-weight: 700;
    color: #f1f5f9;
  }
  input[type=range] {
    width: 100%;
    height: 6px;
    -webkit-appearance: none;
    appearance: none;
    background: linear-gradient(to right, #60a5fa 0%, #34d399 33%, #f87171 100%);
    border-radius: 6px;
    outline: none;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 22px; height: 22px;
    border-radius: 50%;
    background: #f1f5f9;
    border: 3px solid #0f172a;
    box-shadow: 0 0 0 2px #60a5fa;
    cursor: pointer;
    transition: box-shadow 0.2s;
  }
  input[type=range]::-webkit-slider-thumb:hover {
    box-shadow: 0 0 0 4px rgba(96,165,250,0.3);
  }

  .state-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: 1px;
    transition: background 0.4s, color 0.4s;
    margin-bottom: 20px;
  }
  .state-badge.solid   { background: rgba(96,165,250,0.2);  color: #60a5fa; border: 1px solid #60a5fa44; }
  .state-badge.liquid  { background: rgba(52,211,153,0.2);  color: #34d399; border: 1px solid #34d39944; }
  .state-badge.gas     { background: rgba(248,113,113,0.2); color: #f87171; border: 1px solid #f8717144; }

  .badge-row { display: flex; justify-content: center; }

  .info-panel {
    background: #1e293b;
    border-radius: 16px;
    padding: 20px;
    border: 1px solid #334155;
    margin-bottom: 20px;
  }
  .info-panel h3 {
    font-size: 0.8rem;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: #64748b;
    margin-bottom: 14px;
  }
  .property-row {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 10px;
    padding: 10px 0;
    border-bottom: 1px solid #334155;
    align-items: center;
  }
  .property-row:last-child { border-bottom: none; }
  .prop-name { font-size: 0.875rem; color: #94a3b8; }
  .prop-value {
    font-size: 0.9rem;
    font-weight: 600;
    color: #f1f5f9;
    transition: color 0.4s;
  }

  .presets {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .preset-btn {
    background: #1e293b;
    border: 1px solid #334155;
    color: #94a3b8;
    padding: 10px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 0.875rem;
    font-weight: 500;
    transition: all 0.2s;
    font-family: inherit;
  }
  .preset-btn:hover {
    background: #334155;
    color: #f1f5f9;
    border-color: #475569;
  }
  .preset-btn:active { transform: scale(0.97); }

  .footer {
    text-align: center;
    margin-top: 28px;
    color: #475569;
    font-size: 0.8rem;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>🔬 Các Thể Của Chất</h1>
    <p>Kéo thanh nhiệt độ để xem phân tử thay đổi</p>
  </div>

  <div class="canvas-panel">
    <canvas id="simCanvas" width="640" height="300"></canvas>
  </div>

  <div class="canvas-panel slider-section">
    <div class="slider-header">
      <span class="slider-label">Nhiệt độ</span>
      <span class="temp-display" id="tempDisplay">0 °C</span>
    </div>
    <input type="range" id="tempSlider" min="0" max="500" value="0">
  </div>

  <div class="badge-row">
    <div class="state-badge solid" id="stateBadge">❄️ RẮN</div>
  </div>

  <div class="info-panel" style="margin-top:16px;">
    <h3>Tính chất của thể</h3>
    <div class="property-row">
      <span class="prop-name">Hình dạng</span>
      <span class="prop-value" id="propShape">Xác định</span>
    </div>
    <div class="property-row">
      <span class="prop-name">Thể tích</span>
      <span class="prop-value" id="propVolume">Xác định</span>
    </div>
    <div class="property-row">
      <span class="prop-name">Chuyển động phân tử</span>
      <span class="prop-value" id="propMotion">Dao động tại chỗ</span>
    </div>
  </div>

  <div class="presets">
    <button class="preset-btn" onclick="setTemp(0)">🧊 Nước đá 0°C</button>
    <button class="preset-btn" onclick="setTemp(100)">💧 Nước sôi 100°C</button>
    <button class="preset-btn" onclick="setTemp(200)">💨 Hơi nước 200°C</button>
  </div>

  <div class="footer">KHTN Lớp 6 · Kết nối tri thức với cuộc sống</div>
</div>

<script>
const canvas = document.getElementById('simCanvas');
const ctx = canvas.getContext('2d');
const slider = document.getElementById('tempSlider');
const tempDisplay = document.getElementById('tempDisplay');
const stateBadge = document.getElementById('stateBadge');
const propShape = document.getElementById('propShape');
const propVolume = document.getElementById('propVolume');
const propMotion = document.getElementById('propMotion');

const W = canvas.width;
const H = canvas.height;
const NUM_PARTICLES = 60;
const RADIUS = 6;

// State thresholds
const SOLID_MAX = 100;   // 0-100°C => solid
const LIQUID_MAX = 300;  // 100-300°C => liquid
// 300-500°C => gas

// Colors
const C_SOLID  = { r:96,  g:165, b:250 }; // #60a5fa
const C_LIQUID = { r:52,  g:211, b:153 }; // #34d399
const C_GAS    = { r:248, g:113, b:113 }; // #f87171

function lerpColor(a, b, t) {
  return {
    r: Math.round(a.r + (b.r - a.r) * t),
    g: Math.round(a.g + (b.g - a.g) * t),
    b: Math.round(a.b + (b.b - a.b) * t)
  };
}
function toRgba(c, a=1) {
  return `rgba(${c.r},${c.g},${c.b},${a})`;
}

// Build grid home positions for solid state
function buildGrid(n) {
  const cols = Math.ceil(Math.sqrt(n * (W/H)));
  const rows = Math.ceil(n / cols);
  const spacingX = (W - 40) / (cols);
  const spacingY = (H - 40) / (rows);
  const positions = [];
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (positions.length >= n) break;
      positions.push({
        x: 20 + spacingX * c + spacingX/2,
        y: 20 + spacingY * r + spacingY/2
      });
    }
  }
  return positions;
}

const gridPositions = buildGrid(NUM_PARTICLES);

// Particle init
const particles = [];
for (let i = 0; i < NUM_PARTICLES; i++) {
  const home = gridPositions[i];
  particles.push({
    x: home.x,
    y: home.y,
    vx: (Math.random() - 0.5) * 2,
    vy: (Math.random() - 0.5) * 2,
    phase: Math.random() * Math.PI * 2,
    phaseSpeed: 0.05 + Math.random() * 0.05
  });
}

let currentTemp = 0;

function getStateFactor(temp) {
  // Returns: solidFactor (0-1), liquidFactor (0-1), gasFactor (0-1)
  // with smooth blending near transitions
  const blend = 20; // degrees for transition zone
  let s = 0, l = 0, g = 0;

  if (temp <= SOLID_MAX - blend) {
    s = 1; l = 0; g = 0;
  } else if (temp <= SOLID_MAX + blend) {
    const t = (temp - (SOLID_MAX - blend)) / (2 * blend);
    s = 1 - t; l = t; g = 0;
  } else if (temp <= LIQUID_MAX - blend) {
    s = 0; l = 1; g = 0;
  } else if (temp <= LIQUID_MAX + blend) {
    const t = (temp - (LIQUID_MAX - blend)) / (2 * blend);
    s = 0; l = 1 - t; g = t;
  } else {
    s = 0; l = 0; g = 1;
  }
  return { s, l, g };
}

function getParticleColor(s, l, g) {
  if (s >= l && s >= g) {
    if (l > 0) return lerpColor(C_SOLID, C_LIQUID, l / (s + l));
    return C_SOLID;
  }
  if (l >= g) {
    if (g > 0) return lerpColor(C_LIQUID, C_GAS, g / (l + g));
    if (s > 0) return lerpColor(C_SOLID, C_LIQUID, l / (s + l));
    return C_LIQUID;
  }
  if (l > 0) return lerpColor(C_LIQUID, C_GAS, g / (l + g));
  return C_GAS;
}

function update(temp) {
  const { s, l, g } = getStateFactor(temp);

  // Speed scale
  const solidSpeed = 0.8;
  const liquidSpeed = 1.8 + (temp / LIQUID_MAX) * 1.5;
  const gasSpeed = 3.5 + ((temp - LIQUID_MAX) / (500 - LIQUID_MAX)) * 5;

  const liquidBoundary = H * 0.38; // top of liquid zone
  const gravity = 0.12;

  particles.forEach((p, i) => {
    const home = gridPositions[i];

    if (s > 0) {
      // Solid: vibrate around home
      p.phase += p.phaseSpeed;
      const vibAmp = 3 * s;
      const targetX = home.x + Math.sin(p.phase) * vibAmp;
      const targetY = home.y + Math.cos(p.phase * 1.3) * vibAmp;
      p.x += (targetX - p.x) * (0.2 + 0.3 * s);
      p.y += (targetY - p.y) * (0.2 + 0.3 * s);
    }

    if (l > 0) {
      // Liquid: free movement in lower portion
      const speed = liquidSpeed * l;
      // normalize velocity and apply speed
      const mag = Math.sqrt(p.vx*p.vx + p.vy*p.vy) || 1;
      p.vx = (p.vx / mag) * speed;
      p.vy = (p.vy / mag) * speed;

      // Apply gravity pull toward lower half
      if (p.y < liquidBoundary) {
        p.vy += gravity * l * 2;
      } else {
        p.vy += gravity * l * 0.3;
      }

      // Small random nudge
      p.vx += (Math.random() - 0.5) * 0.3 * l;
      p.vy += (Math.random() - 0.5) * 0.3 * l;

      p.x += p.vx * l;
      p.y += p.vy * l;

      // Bounce off walls (liquid stays in lower region)
      if (p.x < RADIUS)     { p.x = RADIUS;     p.vx = Math.abs(p.vx); }
      if (p.x > W - RADIUS) { p.x = W - RADIUS; p.vx = -Math.abs(p.vx); }
      if (p.y > H - RADIUS) { p.y = H - RADIUS; p.vy = -Math.abs(p.vy) * 0.8; }
      if (p.y < liquidBoundary && l > 0.7) {
        p.vy = Math.abs(p.vy) * 0.5;
        p.y = liquidBoundary + 1;
      }
    }

    if (g > 0) {
      // Gas: fly everywhere
      const speed = gasSpeed * g;
      const mag = Math.sqrt(p.vx*p.vx + p.vy*p.vy) || 1;
      p.vx = (p.vx / mag) * speed;
      p.vy = (p.vy / mag) * speed;

      p.vx += (Math.random() - 0.5) * 0.5 * g;
      p.vy += (Math.random() - 0.5) * 0.5 * g;

      p.x += p.vx * g;
      p.y += p.vy * g;

      // Bounce off all walls
      if (p.x < RADIUS)     { p.x = RADIUS;     p.vx = Math.abs(p.vx); }
      if (p.x > W - RADIUS) { p.x = W - RADIUS; p.vx = -Math.abs(p.vx); }
      if (p.y < RADIUS)     { p.y = RADIUS;     p.vy = Math.abs(p.vy); }
      if (p.y > H - RADIUS) { p.y = H - RADIUS; p.vy = -Math.abs(p.vy); }
    }

    // Clamp always
    p.x = Math.max(RADIUS, Math.min(W - RADIUS, p.x));
    p.y = Math.max(RADIUS, Math.min(H - RADIUS, p.y));
  });
}

function draw(temp) {
  const { s, l, g } = getStateFactor(temp);
  const color = getParticleColor(s, l, g);

  ctx.clearRect(0, 0, W, H);

  // Draw liquid boundary line
  if (l > 0.1) {
    const liquidBoundary = H * 0.38;
    ctx.save();
    ctx.strokeStyle = toRgba(C_LIQUID, 0.15 * l);
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, liquidBoundary);
    ctx.lineTo(W, liquidBoundary);
    ctx.stroke();
    ctx.restore();
  }

  // Draw particles
  particles.forEach(p => {
    const grd = ctx.createRadialGradient(p.x - 2, p.y - 2, 1, p.x, p.y, RADIUS);
    grd.addColorStop(0, toRgba(color, 1));
    grd.addColorStop(1, toRgba(color, 0.6));
    ctx.beginPath();
    ctx.arc(p.x, p.y, RADIUS, 0, Math.PI * 2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Glow
    ctx.beginPath();
    ctx.arc(p.x, p.y, RADIUS + 2, 0, Math.PI * 2);
    ctx.fillStyle = toRgba(color, 0.12);
    ctx.fill();
  });

  // State label on canvas
  ctx.save();
  ctx.font = 'bold 13px Segoe UI, system-ui, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  const stateText = s > 0.5 ? 'RẮN' : (l > 0.5 ? 'LỎNG' : 'KHÍ');
  ctx.fillText(stateText, 12, 22);
  ctx.restore();
}

function updateUI(temp) {
  tempDisplay.textContent = temp + ' °C';

  const { s, l, g } = getStateFactor(temp);
  let stateName, emoji, cls, shape, vol, motion;

  if (s >= l && s >= g) {
    stateName = 'RẮN'; emoji = '❄️'; cls = 'solid';
    shape = 'Xác định';
    vol = 'Xác định';
    motion = 'Dao động tại chỗ';
  } else if (l >= g) {
    stateName = 'LỎNG'; emoji = '💧'; cls = 'liquid';
    shape = 'Không xác định';
    vol = 'Xác định';
    motion = 'Trượt qua nhau';
  } else {
    stateName = 'KHÍ'; emoji = '💨'; cls = 'gas';
    shape = 'Không xác định';
    vol = 'Không xác định';
    motion = 'Bay tự do, nhanh';
  }

  stateBadge.textContent = emoji + ' ' + stateName;
  stateBadge.className = 'state-badge ' + cls;
  propShape.textContent = shape;
  propVolume.textContent = vol;
  propMotion.textContent = motion;
}

function setTemp(val) {
  slider.value = val;
  currentTemp = val;
  updateUI(val);
}

slider.addEventListener('input', () => {
  currentTemp = parseInt(slider.value);
  updateUI(currentTemp);
});

function loop() {
  update(currentTemp);
  draw(currentTemp);
  requestAnimationFrame(loop);
}

// Init velocities for liquid/gas behavior
particles.forEach(p => {
  const angle = Math.random() * Math.PI * 2;
  p.vx = Math.cos(angle) * 1.5;
  p.vy = Math.sin(angle) * 1.5;
});

updateUI(0);
loop();
</script>
</body>
</html>
