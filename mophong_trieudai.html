<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Các Triều Đại Việt Nam</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f172a;color:#f1f5f9;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column}
header{background:#1e293b;border-bottom:1px solid #334155;padding:16px 24px;flex-shrink:0}
header h1{font-size:22px;font-weight:700;color:#f1f5f9;margin-bottom:4px}
header p{font-size:13px;color:#94a3b8}
.main{display:flex;flex:1;overflow:hidden;min-height:0}
.left-col{width:38%;min-width:260px;background:#1e293b;border-right:1px solid #334155;display:flex;flex-direction:column;overflow:hidden}
.filter-bar{padding:12px 16px;border-bottom:1px solid #334155;display:flex;gap:8px;flex-wrap:wrap;flex-shrink:0}
.filter-btn{padding:5px 12px;border-radius:20px;border:1px solid #475569;background:transparent;color:#94a3b8;font-size:12px;cursor:pointer;transition:all 0.2s}
.filter-btn.active{background:#3b82f6;border-color:#3b82f6;color:#fff}
.timeline-scroll{flex:1;overflow-y:auto;padding:16px 16px 16px 0;position:relative}
.timeline-scroll::-webkit-scrollbar{width:4px}
.timeline-scroll::-webkit-scrollbar-track{background:#0f172a}
.timeline-scroll::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
.tl-line{position:absolute;left:40px;top:0;bottom:0;width:2px;background:#334155}
.dynasty-row{display:flex;align-items:center;padding:10px 12px 10px 16px;cursor:pointer;border-radius:8px;margin-bottom:4px;margin-left:4px;position:relative;transition:background 0.15s,opacity 0.2s;border:1px solid transparent}
.dynasty-row:hover{background:#0f172a55}
.dynasty-row.selected{background:#1e40af22;border-color:#3b82f650}
.dynasty-row.dimmed{opacity:0.25}
.dot-wrap{position:relative;width:38px;flex-shrink:0;display:flex;justify-content:center}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #0f172a;flex-shrink:0;z-index:1}
.row-info{flex:1;min-width:0;margin-left:10px}
.row-name{font-size:13px;font-weight:600;color:#f1f5f9;line-height:1.3}
.row-years{font-size:11px;color:#64748b;margin-top:2px}
.tag{font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;flex-shrink:0;margin-left:8px;white-space:nowrap}
.tag-dl{background:#064e3b;color:#6ee7b7}
.tag-bt{background:#450a0a;color:#fca5a5}
.tag-cn{background:#500724;color:#f9a8d4}
.right-col{width:62%;background:#0f172a;overflow-y:auto;padding:24px}
.right-col::-webkit-scrollbar{width:4px}
.right-col::-webkit-scrollbar-track{background:#0f172a}
.right-col::-webkit-scrollbar-thumb{background:#475569;border-radius:2px}
.placeholder{height:100%;min-height:300px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:#475569}
.placeholder .arrow{font-size:32px}
.placeholder p{font-size:15px}
.info-card{background:#1e293b;border-radius:12px;padding:24px;border:1px solid #334155}
.info-header{margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid #334155}
.info-title{font-size:24px;font-weight:700;margin-bottom:8px}
.year-badge{display:inline-block;background:#0f172a;border:1px solid #475569;color:#94a3b8;font-size:12px;padding:3px 10px;border-radius:6px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.info-item{background:#0f172a;border-radius:8px;padding:12px}
.info-label{font-size:11px;color:#64748b;margin-bottom:6px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px}
.info-value{font-size:13px;color:#e2e8f0;line-height:1.5}
.kinh-do-badge{display:inline-flex;align-items:center;gap:5px;background:#1e3a5f;color:#93c5fd;padding:5px 10px;border-radius:6px;font-size:13px;font-weight:500}
.section-title{font-size:13px;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
.events-list{list-style:none;display:flex;flex-direction:column;gap:8px;margin-bottom:20px}
.events-list li{padding:8px 12px;background:#0f172a;border-left:3px solid #475569;border-radius:0 6px 6px 0;font-size:13px;color:#cbd5e1;line-height:1.5}
.meaning-box{background:#1c130022;border:1px solid #92400e55;border-radius:8px;padding:14px;font-size:13px;color:#fcd34d;line-height:1.6;background-color:#1a0e00}
.stats-bar{background:#1e293b;border-top:1px solid #334155;padding:14px 24px;display:flex;gap:16px;flex-shrink:0}
.stat-card{flex:1;background:#0f172a;border-radius:8px;padding:12px 16px;text-align:center;border:1px solid #334155}
.stat-card .stat-icon{font-size:18px;margin-bottom:4px}
.stat-card .stat-num{font-size:15px;font-weight:700;color:#f1f5f9;margin-bottom:2px}
.stat-card .stat-label{font-size:11px;color:#64748b}
</style>
</head>

<header>

var tagClass = {"Độc lập":"tag-dl","Bắc thuộc":"tag-bt","Chống XN":"tag-cn"};
var selectedId = null;
var activeFilter = "all";

function renderTimeline() {
  var list = document.getElementById("dynastyList");
  list.innerHTML = "";
  dynasties.forEach(function(d) {
    var isMatch = activeFilter === "all" || d.tag === activeFilter;
    var row = document.createElement("div");
    var cls = "dynasty-row";
    if (selectedId === d.id) cls += " selected";
    if (!isMatch) cls += " dimmed";
    row.className = cls;
    row.dataset.id = d.id;
    row.innerHTML =
      '<div class="dot-wrap"><div class="dot" style="background:' + d.color + '"></div></div>' +
      '<div class="row-info">' +
        '<div class="row-name">' + d.name + '</div>' +
        '<div class="row-years">' + d.years + '</div>' +
      '</div>' +
      '<span class="tag ' + tagClass[d.tag] + '">' + d.tag + '</span>';
    row.addEventListener("click", function() { selectDynasty(d.id); });
    list.appendChild(row);
  });
}

function selectDynasty(id) {
  selectedId = id;
  var d = null;
  for (var i = 0; i < dynasties.length; i++) {
    if (dynasties[i].id === id) { d = dynasties[i]; break; }
  }
  renderTimeline();

  document.getElementById("placeholder").style.display = "none";
  var panel = document.getElementById("infoPanel");
  panel.style.display = "block";

  var eventsHtml = d.events.map(function(e) {
    return "<li>" + e + "</li>";
  }).join("");

  panel.innerHTML =
    '<div class="info-card">' +
      '<div class="info-header">' +
        '<div class="info-title" style="color:' + d.color + '">' + d.name + '</div>' +
        '<span class="year-badge">' + d.years + '</span>' +
      '</div>' +
      '<div class="info-grid">' +
        '<div class="info-item">' +
          '<div class="info-label">👑 Người sáng lập / Vua tiêu biểu</div>' +
          '<div class="info-value">' + d.founder + '</div>' +
        '</div>' +
        '<div class="info-item">' +
          '<div class="info-label">Kinh đô</div>' +
          '<div class="info-value"><span class="kinh-do-badge">📍 ' + d.capital + '</span></div>' +
        '</div>' +
        '<div class="info-item">' +
          '<div class="info-label">⏳ Thời gian tồn tại</div>' +
          '<div class="info-value">' + d.duration + '</div>' +
        '</div>' +
        '<div class="info-item">' +
          '<div class="info-label">🏷️ Thể chế</div>' +
          '<div class="info-value">' + d.regime + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="section-title">📌 Sự kiện quan trọng</div>' +
      '<ul class="events-list">' + eventsHtml + '</ul>' +
      '<div class="section-title">💡 Ý nghĩa lịch sử</div>' +
      '<div class="meaning-box">' + d.meaning + '</div>' +
    '</div>';
}

document.querySelectorAll(".filter-btn").forEach(function(btn) {
  btn.addEventListener("click", function() {
    document.querySelectorAll(".filter-btn").forEach(function(b) { b.classList.remove("active"); });
    btn.classList.add("active");
    activeFilter = btn.dataset.filter;
    renderTimeline();
  });
});

renderTimeline();
</script>
</body>
</html>
