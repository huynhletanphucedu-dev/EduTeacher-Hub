<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fraction Match – Toán</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
body{background:#0f172a;color:#e2e8f0;font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
header{width:100%;background:#1e293b;padding:.75rem 1rem;text-align:center;border-bottom:1px solid #334155}
header h1{font-size:1.1rem;font-weight:700;color:#fbbf24;letter-spacing:.05em}
header h2{font-size:.75rem;color:#94a3b8;margin-top:2px}
.stats{display:flex;gap:1rem;justify-content:center;padding:.6rem 1rem;width:100%;max-width:440px}
.stat{background:#1e293b;border-radius:10px;padding:.35rem .9rem;font-size:.8rem;color:#94a3b8;text-align:center}
.stat span{display:block;font-size:1.1rem;font-weight:700;color:#f8fafc}
/* Mode selector */
.mode-bar{display:flex;gap:7px;padding:0 1rem .5rem;width:100%;max-width:440px}
.mode-btn{flex:1;background:#1e293b;border:1px solid #334155;border-radius:8px;padding:.4rem;font-size:.72rem;color:#94a3b8;cursor:pointer;text-align:center}
.mode-btn.active{background:#713f12;border-color:#fbbf24;color:#fef3c7}
/* Card grid */
.card-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:.4rem 1rem;width:100%;max-width:440px}
.card{height:72px;perspective:600px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .35s;border-radius:12px}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-front,.card-back{position:absolute;inset:0;border-radius:12px;backface-visibility:hidden;-webkit-backface-visibility:hidden;display:flex;align-items:center;justify-content:center;font-size:.9rem;font-weight:700}
.card-front{background:#1e293b;border:2px solid #334155;color:#64748b;font-size:1.5rem}
.card-back{background:#1e293b;border:2px solid #d97706;color:#f8fafc;transform:rotateY(180deg);line-height:1.3;padding:4px;text-align:center}
.card.matched .card-back{background:#052e16;border-color:#16a34a;color:#4ade80}
.card.wrong-flash .card-back{background:#450a0a;border-color:#dc2626}
/* Fraction display */
.frac{display:inline-flex;flex-direction:column;align-items:center;line-height:1.1;font-size:.85rem}
.frac .n{border-bottom:1.5px solid currentColor;padding:0 3px;min-width:14px;text-align:center}
.frac .d{padding:0 3px;min-width:14px;text-align:center}
/* Level btns */
.btn-new{margin:.4rem 1rem;width:calc(100% - 2rem);max-width:440px;background:#d97706;color:#fff;border:none;border-radius:12px;padding:.75rem;font-size:.9rem;font-weight:700;cursor:pointer}
/* Overlay */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:50}
.result-card{background:#1e293b;border-radius:18px;padding:2rem;text-align:center;max-width:300px;width:90%}
.re{font-size:3rem;margin-bottom:.5rem}.rt{font-size:1.4rem;font-weight:700;margin-bottom:.4rem}.rs{font-size:.9rem;color:#94a3b8;margin-bottom:1rem}
.btn-re{background:#d97706;color:#fff;border:none;border-radius:10px;padding:.75rem 2rem;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
</style>
</head>
<body>
<header>
  <h1>🃏 FRACTION MATCH</h1>
  <h2>TÌM CẶP GIÁ TRỊ BẰNG NHAU</h2>
</header>
<div class="mode-bar">
  <button class="mode-btn active" onclick="setMode(0,this)">Phân số</button>
  <button class="mode-btn" onclick="setMode(1,this)">Phân số ↔ %</button>
  <button class="mode-btn" onclick="setMode(2,this)">3 dạng hỗn</button>
</div>
<div class="stats">
  <div class="stat"><span id="pairsFound">0</span>Cặp</div>
  <div class="stat"><span id="totalPairs">0</span>Tổng</div>
  <div class="stat"><span id="moves">0</span>Lượt</div>
</div>
<div class="card-grid" id="cardGrid"></div>
<button class="btn-new" onclick="newGame()">🔄 Ván mới</button>

<div class="overlay" id="overlay">
  <div class="result-card">
    <div class="re">🏆</div><div class="rt">Ghép hết rồi!</div>
    <div class="rs" id="rs"></div>
    <button class="btn-re" onclick="newGame()">Chơi lại</button>
  </div>
</div>

<script>
// Equivalent value pairs
const PAIR_POOLS = {
  0: [ // fraction pairs (equivalent fractions)
    [{t:'frac',n:1,d:2},{t:'frac',n:2,d:4}],
    [{t:'frac',n:1,d:2},{t:'frac',n:3,d:6}],
    [{t:'frac',n:1,d:3},{t:'frac',n:2,d:6}],
    [{t:'frac',n:2,d:3},{t:'frac',n:4,d:6}],
    [{t:'frac',n:3,d:4},{t:'frac',n:6,d:8}],
    [{t:'frac',n:1,d:4},{t:'frac',n:2,d:8}],
    [{t:'frac',n:2,d:5},{t:'frac',n:4,d:10}],
    [{t:'frac',n:3,d:5},{t:'frac',n:6,d:10}],
    [{t:'frac',n:1,d:6},{t:'frac',n:2,d:12}],
    [{t:'frac',n:5,d:6},{t:'frac',n:10,d:12}],
    [{t:'frac',n:3,d:9},{t:'frac',n:1,d:3}],
    [{t:'frac',n:4,d:8},{t:'frac',n:1,d:2}],
  ],
  1: [ // fraction ↔ percent
    [{t:'frac',n:1,d:2},{t:'pct',v:50}],
    [{t:'frac',n:1,d:4},{t:'pct',v:25}],
    [{t:'frac',n:3,d:4},{t:'pct',v:75}],
    [{t:'frac',n:1,d:5},{t:'pct',v:20}],
    [{t:'frac',n:2,d:5},{t:'pct',v:40}],
    [{t:'frac',n:3,d:5},{t:'pct',v:60}],
    [{t:'frac',n:4,d:5},{t:'pct',v:80}],
    [{t:'frac',n:1,d:10},{t:'pct',v:10}],
    [{t:'frac',n:3,d:10},{t:'pct',v:30}],
    [{t:'frac',n:7,d:10},{t:'pct',v:70}],
    [{t:'frac',n:1,d:100},{t:'pct',v:1}],
    [{t:'frac',n:1,d:20},{t:'pct',v:5}],
  ],
  2: [ // mixed: fraction + decimal + percent 3-way (show 2 of 3 forms)
    [{t:'frac',n:1,d:2},{t:'dec',v:0.5}],
    [{t:'dec',v:0.5},{t:'pct',v:50}],
    [{t:'frac',n:1,d:4},{t:'dec',v:0.25}],
    [{t:'dec',v:0.25},{t:'pct',v:25}],
    [{t:'frac',n:3,d:4},{t:'dec',v:0.75}],
    [{t:'pct',v:75},{t:'dec',v:0.75}],
    [{t:'frac',n:1,d:5},{t:'dec',v:0.2}],
    [{t:'dec',v:0.2},{t:'pct',v:20}],
    [{t:'frac',n:2,d:5},{t:'dec',v:0.4}],
    [{t:'dec',v:0.6},{t:'pct',v:60}],
    [{t:'dec',v:0.8},{t:'pct',v:80}],
    [{t:'frac',n:3,d:10},{t:'dec',v:0.3}],
  ],
};

let mode=0, cards=[], flipped=[], pairs=0, totalPairs=0, moves=0, canFlip=true;

function setMode(m,btn){
  mode=m;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');newGame();
}

function newGame(){
  document.getElementById('overlay').style.display='none';
  const pool=[...PAIR_POOLS[mode]];
  shuffle(pool);
  const chosen=pool.slice(0,6); // 6 pairs = 12 cards
  totalPairs=chosen.length;
  pairs=0;moves=0;flipped=[];canFlip=true;
  document.getElementById('totalPairs').textContent=totalPairs;
  document.getElementById('pairsFound').textContent=0;
  document.getElementById('moves').textContent=0;
  // flatten into card objects
  cards=[];
  chosen.forEach((pair,i)=>{
    pair.forEach(item=>{
      cards.push({...item,pairId:i,matched:false,id:cards.length});
    });
  });
  shuffle(cards);
  renderCards();
}

function shuffle(a){for(let i=a.length-1;i>0;i--){let j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}

function renderCards(){
  const grid=document.getElementById('cardGrid');
  grid.style.gridTemplateColumns=`repeat(4,1fr)`;
  grid.innerHTML='';
  cards.forEach((card,idx)=>{
    const div=document.createElement('div');div.className='card'+(card.matched?' flipped matched':'');
    div.innerHTML=`<div class="card-inner"><div class="card-front">?</div><div class="card-back">${displayCard(card)}</div></div>`;
    if(!card.matched)div.onclick=()=>flipCard(idx,div);
    grid.appendChild(div);
  });
}

function displayCard(card){
  if(card.t==='frac')return `<span class="frac"><span class="n">${card.n}</span><span class="d">${card.d}</span></span>`;
  if(card.t==='pct')return card.v+'%';
  if(card.t==='dec')return card.v.toString().replace('.',',');
  return '';
}

function flipCard(idx,div){
  if(!canFlip)return;
  if(flipped.includes(idx))return;
  if(cards[idx].matched)return;
  div.classList.add('flipped');
  flipped.push(idx);
  if(flipped.length===2){
    canFlip=false;moves++;
    document.getElementById('moves').textContent=moves;
    setTimeout(()=>checkMatch(),700);
  }
}

function checkMatch(){
  const [i,j]=flipped;
  if(cards[i].pairId===cards[j].pairId){
    cards[i].matched=cards[j].matched=true;
    pairs++;document.getElementById('pairsFound').textContent=pairs;
    playSound(true);
    renderCards();
    if(pairs===totalPairs)setTimeout(()=>winGame(),300);
  } else {
    // flash wrong
    const allCards=document.querySelectorAll('.card');
    [flipped[0],flipped[1]].forEach(idx=>{allCards[idx].classList.add('wrong-flash');});
    playSound(false);
    setTimeout(()=>{
      [flipped[0],flipped[1]].forEach(idx=>{
        allCards[idx].classList.remove('flipped','wrong-flash');
      });
      flipped=[];canFlip=true;
    },500);
    return;
  }
  flipped=[];canFlip=true;
}

function winGame(){
  document.getElementById('rs').textContent=`${moves} lượt — ${totalPairs} cặp`;
  document.getElementById('overlay').style.display='flex';
}

const AC=new (window.AudioContext||window.webkitAudioContext)();
function playSound(win){
  const o=AC.createOscillator(),g=AC.createGain();
  o.connect(g);g.connect(AC.destination);
  if(win){o.frequency.setValueAtTime(659,AC.currentTime);o.frequency.setValueAtTime(784,AC.currentTime+.1);o.frequency.setValueAtTime(1047,AC.currentTime+.2);}
  else{o.frequency.setValueAtTime(200,AC.currentTime);}
  g.gain.setValueAtTime(.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(.001,AC.currentTime+.4);
  o.start();o.stop(AC.currentTime+.4);
}

newGame();
</script>

</body>
</html>
